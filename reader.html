<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Read on PeeyashBooks</title>
  <meta name="description" content="Read published ebooks on PeeyashBooks." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="reader" class="reader-body">
  <div class="ambient ambient-1"></div>
  <div class="ambient ambient-2"></div>
  <div class="noise"></div>

  <header class="site-header shell">
    <a class="brand" href="index.html" aria-label="PeeyashBooks home">
      <span class="brand-mark"></span>
      <span>PeeyashBooks</span>
    </a>
    <a href="editor.html" class="btn btn-ghost">Write your own</a>
  </header>

  <main class="reader-main shell">
    <article class="reader-card section-card reveal-up">
      <div class="reader-meta eyebrow">Published reading experience</div>
      <h1 id="readerTitle">Untitled ebook</h1>
      <p id="readerAuthor" class="reader-author">by Anonymous Author</p>
      <div id="readerContent" class="reader-content"></div>
    </article>
  </main>

  <footer class="reader-footer shell">
    <span>Published with PeeyashBooks</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
